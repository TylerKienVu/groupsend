name: GroupSend
options:
  bundleIdPrefix: com.tyler
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_PREVIEWS: YES

targets:
  GroupSend:
    type: application
    platform: iOS
    sources:
      - path: GroupSend
    info:
      path: GroupSend/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - groupsend
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tyler.groupsend
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
