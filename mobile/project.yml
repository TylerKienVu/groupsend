name: GroupSend
options:
  bundleIdPrefix: com.tyler
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

packages:
  ClerkSDK:
    url: https://github.com/clerk/clerk-ios
    from: "1.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_PREVIEWS: YES

targets:
  GroupSend:
    type: application
    platform: iOS
    sources:
      - path: GroupSend
    dependencies:
      - package: ClerkSDK
        product: ClerkKit
    info:
      path: GroupSend/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - groupsend
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        # Clerk reads this key automatically during Clerk.shared.load()
        # Find your publishable key in the Clerk dashboard → API Keys
        ClerkPublishableKey: "pk_test_cmVhbC1mcm9nLTUwLmNsZXJrLmFjY291bnRzLmRldiQ"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tyler.groupsend
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
