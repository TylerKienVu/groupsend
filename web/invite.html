<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join on GroupSend</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    .label {
      font-size: 13px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    .group-name {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .gym-name {
      font-size: 16px;
      color: #aaa;
      margin-bottom: 6px;
    }

    .member-count {
      font-size: 14px;
      color: #666;
      margin-bottom: 32px;
    }

    .app-store-btn {
      display: inline-block;
      background: #fff;
      color: #000;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      padding: 14px 28px;
      border-radius: 12px;
      margin-bottom: 12px;
      width: 100%;
    }

    .app-store-btn:hover { background: #e5e5e5; }

    .hint {
      font-size: 13px;
      color: #555;
    }

    .error {
      color: #ff6b6b;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <p class="label">Loading...</p>
  </div>

  <script>
    const API = "https://groupsend-production.up.railway.app";

    const code = window.location.pathname.split("/invite/")[1];

    async function load() {
      const card = document.getElementById("card");

      if (!code) {
        card.innerHTML = '<p class="error">Invalid invite link.</p>';
        return;
      }

      try {
        const res = await fetch(`${API}/groups/invite/${code}`);

        if (!res.ok) {
          card.innerHTML = '<p class="error">This invite link is invalid or has expired.</p>';
          return;
        }

        const group = await res.json();
        const memberWord = group.memberCount === 1 ? "member" : "members";

        card.innerHTML = `
          <p class="label">You're invited to join</p>
          <p class="group-name">${group.name}</p>
          ${group.gymName ? `<p class="gym-name">${group.gymName}</p>` : ""}
          <p class="member-count">${group.memberCount} ${memberWord}</p>
          <a class="app-store-btn" href="#">Download GroupSend on the App Store</a>
          <p class="hint">Open this link on your phone after installing the app.</p>
        `;
      } catch {
        card.innerHTML = '<p class="error">Something went wrong. Please try again.</p>';
      }
    }

    load();
  </script>
</body>
</html>
